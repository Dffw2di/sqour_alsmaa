<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صقور السماء - النسخة النهائية</title>
    <style>
        /* إعدادات الشاشة الأساسية */
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #game-view {
            width: 100vw; height: 100vh;
            background-image: url('im1.jpeg');
            background-size: cover; background-position: center;
            position: relative; display: none; /* مخفي في البداية */
        }

        /* شاشة البداية */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('im1.png');
            background-size: cover; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 5000;
        }
        #start-screen h1 { font-size: 80px; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #more-text { display: none; margin: 15px 0; color: #ffd700; font-size: 20px; }
        .btn-main {
            padding: 15px 60px; font-size: 24px; cursor: pointer; border-radius: 50px;
            border: none; background: #28a745; color: white; margin: 10px; transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.1); background: #218838; }
        .btn-secondary { background: none; border: 2px solid white; color: white; padding: 8px 20px; cursor: pointer; border-radius: 5px; }

        /* العناصر المتحركة */
        #player { width: 100px; position: absolute; left: 40px; z-index: 100; transition: transform 0.1s; }
        .bullet { width: 50px; position: absolute; z-index: 90; }
        .drone { width: 120px; position: absolute; z-index: 95; }

        /* الواجهة (النقاط) */
        #ui-layer {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 30px; font-weight: bold; text-shadow: 2px 2px 5px #000; z-index: 1000;
        }

        /* شاشة النهاية */
        #end-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 6000;
        }

        /* أزرار الجوال */
        #mobile-controls {
            position: fixed; bottom: 30px; width: 100%; display: none;
            justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 2000;
        }
        .nav-btns { display: flex; flex-direction: column; gap: 15px; }
        .joy-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border: 2px solid #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 25px; color: #fff;
            user-select: none; touch-action: manipulation;
        }
        #btn-fire { width: 110px; height: 110px; background: rgba(255, 0, 0, 0.4); border-color: #ff4d4d; }

        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

    <!-- 1. شاشة البداية -->
    <div id="start-screen">
        <h1>ss</h1>
        <button class="btn-main" onclick="initGame()">ابدأ اللعب</button>
        <button class="btn-secondary" onclick="document.getElementById('more-text').style.display='block'">See More</button>
        <h6 id="more-text">ss1</h6>
    </div>

    <!-- 2. ساحة اللعبة -->
    <div id="game-view">
        <div id="ui-layer">النقاط: <span id="score-val">0</span></div>
        <img src="im2.png" id="player" alt="الطائرة">
        
        <div id="mobile-controls">
            <div class="nav-btns">
                <div class="joy-btn" id="m-up">W</div>
                <div class="joy-btn" id="m-down">S</div>
            </div>
            <div class="joy-btn" id="btn-fire">FIRE</div>
        </div>
    </div>

    <!-- 3. شاشة النهاية -->
    <div id="end-screen">
        <h1 style="color: #ff4d4d; font-size: 60px;">تحطمت الطائرة!</h1>
        <h2 id="final-score" style="font-size: 30px;">النقاط: 0</h2>
        <button class="btn-main" onclick="location.reload()">إعادة محاولة</button>
    </div>

<script>
    const gameView = document.getElementById('game-view');
    const player = document.getElementById('player');
    const scoreVal = document.getElementById('score-val');
    const endScreen = document.getElementById('end-screen');
    
    let score = 0;
    let isLive = false;
    let playerY = window.innerHeight / 2;
    let drone = null;
    let droneSpeed = 5;
    const playerStep = 10;

    // التحكم
    const activeKeys = {};
    window.addEventListener('keydown', (e) => activeKeys[e.code] = true);
    window.addEventListener('keyup', (e) => activeKeys[e.code] = false);

    // تحكم الجوال
    let touchUp = false, touchDown = false;
    document.getElementById('m-up').ontouchstart = (e) => { e.preventDefault(); touchUp = true; };
    document.getElementById('m-up').ontouchend = () => touchUp = false;
    document.getElementById('m-down').ontouchstart = (e) => { e.preventDefault(); touchDown = true; };
    document.getElementById('m-down').ontouchend = () => touchDown = false;
    document.getElementById('btn-fire').ontouchstart = (e) => { e.preventDefault(); if(isLive) fire(); };

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameView.style.display = 'block';
        isLive = true;
        spawnDrone();
        gameLoop();
    }

    function gameLoop() {
        if (!isLive) return;

        // حركة اللاعب
        if (activeKeys['KeyW'] || touchUp) playerY -= playerStep;
        if (activeKeys['KeyS'] || touchDown) playerY += playerStep;

        // حدود الشاشة
        if (playerY < 0) playerY = 0;
        if (playerY > window.innerHeight - 100) playerY = window.innerHeight - 100;
        player.style.top = playerY + 'px';

        // إطلاق الكمبيوتر
        if (activeKeys['Space']) {
            fire();
            activeKeys['Space'] = false; // لمنع تكرار الطلقات بضغطة واحدة
        }

        // حركة المسيرة
        if (drone) {
            let currentRight = parseFloat(drone.style.right);
            drone.style.right = (currentRight + droneSpeed) + 'px';

            // خسارة إذا لمست الطائرة
            if (checkHit(player, drone)) {
                terminateGame();
            }

            // إعادة تدوير المسيرة إذا خرجت
            if (currentRight > window.innerWidth) {
                spawnDrone();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function fire() {
        const b = document.createElement('img');
        b.src = 'im3.png';
        b.className = 'bullet';
        b.style.left = (player.offsetLeft + 90) + 'px';
        b.style.top = (player.offsetTop + 30) + 'px';
        gameView.appendChild(b);

        let moveB = setInterval(() => {
            if (!isLive) { clearInterval(moveB); b.remove(); return; }
            let bLeft = parseFloat(b.style.left);
            b.style.left = (bLeft + 20) + 'px';

            if (drone && checkHit(b, drone)) {
                clearInterval(moveB);
                b.remove();
                score += 10;
                scoreVal.innerText = score;
                explodeDrone();
            }

            if (bLeft > window.innerWidth) {
                clearInterval(moveB);
                b.remove();
            }
        }, 20);
    }

    function spawnDrone() {
        if (drone) drone.remove();
        drone = document.createElement('img');
        drone.src = 'im4.png';
        drone.className = 'drone';
        drone.style.right = '-150px';
        drone.style.top = Math.random() * (window.innerHeight - 150) + 'px';
        gameView.appendChild(drone);
        droneSpeed += 0.2; // زيادة الصعوبة
    }

    function explodeDrone() {
        drone.style.transform = 'scale(1.5)';
        drone.style.filter = 'brightness(5)';
        setTimeout(() => {
            spawnDrone();
        }, 100);
    }

    function terminateGame() {
        isLive = false;
        document.getElementById('final-score').innerText = "مجموع النقاط: " + score;
        endScreen.style.display = 'flex';
        
        // تأثير السقوط
        let drop = 0;
        let anim = setInterval(() => {
            drop += 10;
            player.style.top = (player.offsetTop + drop) + 'px';
            player.style.transform = 'rotate(-30deg)';
            if (player.offsetTop > window.innerHeight) clearInterval(anim);
        }, 30);
    }

    function checkHit(obj1, obj2) {
        let r1 = obj1.getBoundingClientRect();
        let r2 = obj2.getBoundingClientRect();
        const p = 20; // هامش أمان لتصحيح التصادم
        return !(r1.top + p > r2.bottom - p || r1.bottom - p < r2.top + p || r1.right - p < r2.left + p || r1.left + p > r2.right - p);
    }
</script>
</body>
</html>

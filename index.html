<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الطائرة - نسخة كاملة</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: Arial, sans-serif; }
        
        #game-container {
            width: 100vw; height: 100vh;
            background-image: url('im1.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: none; /* يظهر فقط عند بدء اللعبة */
        }

        /* شاشة البداية */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('im1.png');
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 2000;
        }
        #start-screen h1 { font-size: 5rem; margin: 10px; color: #fff; text-shadow: 2px 2px 10px #000; }
        #more-text { display: none; margin-top: 10px; color: #ccc; }
        .start-btn {
            padding: 15px 50px; font-size: 1.5rem; cursor: pointer;
            background: #28a745; color: white; border: none; border-radius: 30px; margin: 10px;
        }
        .see-more-btn {
            background: none; border: 1px solid white; color: white; padding: 5px 15px; cursor: pointer; border-radius: 5px;
        }

        /* عداد النقاط */
        #score-board {
            position: absolute; top: 20px; right: 20px;
            font-size: 2rem; color: white; font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 100;
        }

        #player { width: 90px; position: absolute; left: 50px; top: 50%; z-index: 10; }
        .bullet { width: 45px; position: absolute; z-index: 5; }
        .drone { width: 110px; position: absolute; z-index: 8; }

        #end-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1000;
        }

        #mobile-controls {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            display: none; justify-content: space-between; align-items: flex-end; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.3);
            border: 2px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        #fire-btn { width: 100px; height: 100px; background: rgba(255, 0, 0, 0.5); }

        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<!-- شاشة البداية -->
<div id="start-screen">
    <h1>ss</h1>
    <button class="start-btn" onclick="startGame()">ابدأ اللعب</button>
    <button class="see-more-btn" onclick="showMore()">See More</button>
    <h6 id="more-text">ss1</h6>
</div>

<!-- شاشة اللعبة -->
<div id="game-container">
    <div id="score-board">النقاط: 0</div>
    <img src="im2.png" id="player" alt="الطائرة">
    
    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn" id="up-btn">W</div>
            <div class="btn" id="down-btn">S</div>
        </div>
        <div class="btn" id="fire-btn">إطلاق</div>
    </div>
</div>

<!-- شاشة النهاية -->
<div id="end-screen">
    <h1>انتهت اللعبة!</h1>
    <h2 id="final-score">النقاط: 0</h2>
    <button class="start-btn" onclick="location.reload()">إعادة المحاولة</button>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const gameContainer = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score-board');
    const endScreen = document.getElementById('end-screen');
    const finalScoreElement = document.getElementById('final-score');
    
    let drone = null;
    let playerY = window.innerHeight / 2;
    let isGameOver = false;
    let score = 0;
    const playerSpeed = 10;
    let droneSpeed = 4;

    // دوال شاشة البداية
    function showMore() {
        document.getElementById('more-text').style.display = 'block';
    }

    function startGame() {
        startScreen.style.display = 'none';
        gameContainer.style.display = 'block';
        createDrone();
        update();
    }

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // تحكم الجوال
    let moveUp = false, moveDown = false;
    document.getElementById('up-btn').ontouchstart = (e) => { e.preventDefault(); moveUp = true; };
    document.getElementById('up-btn').ontouchend = () => moveUp = false;
    document.getElementById('down-btn').ontouchstart = (e) => { e.preventDefault(); moveDown = true; };
    document.getElementById('down-btn').ontouchend = () => moveDown = false;
    document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); if(!isGameOver) shoot(); };

    function update() {
        if (isGameOver) return;

        if (keys['KeyW'] || moveUp) playerY -= playerSpeed;
        if (keys['KeyS'] || moveDown) playerY += playerSpeed;

        if (playerY < 0) playerY = 0;
        if (playerY > window.innerHeight - 90) playerY = window.innerHeight - 90;
        player.style.top = playerY + 'px';

        if (keys['Space']) {
            shoot();
            keys['Space'] = false;
        }

        if (drone) {
            let droneX = parseInt(drone.style.right);
            drone.style.right = (droneX + droneSpeed) + 'px';

            if (droneX > window.innerWidth) {
                createDrone();
            }

            if (isColliding(player, drone)) {
                gameOver();
            }
        }

        requestAnimationFrame(update);
    }

    function shoot() {
        const bullet = document.createElement('img');
        bullet.src = 'im3.png';
        bullet.className = 'bullet';
        bullet.style.left = (player.offsetLeft + 85) + 'px';
        bullet.style.top = (player.offsetTop + 20) + 'px';
        gameContainer.appendChild(bullet);

        let bulletMove = setInterval(() => {
            if (isGameOver) { clearInterval(bulletMove); bullet.remove(); return; }
            
            let currentLeft = parseInt(bullet.style.left);
            bullet.style.left = (currentLeft + 18) + 'px';

            if (drone && isColliding(bullet, drone)) {
                updateScore();
                destroyDrone();
                bullet.remove();
                clearInterval(bulletMove);
            }

            if (currentLeft > window.innerWidth) {
                bullet.remove();
                clearInterval(bulletMove);
            }
        }, 20);
    }

    function updateScore() {
        score += 10;
        scoreElement.innerText = "النقاط: " + score;
    }

    function createDrone() {
        if (drone) drone.remove();
        drone = document.createElement('img');
        drone.src = 'im4.png';
        drone.className = 'drone';
        drone.style.right = '-120px'; 
        drone.style.top = Math.random() * (window.innerHeight - 120) + 'px';
        gameContainer.appendChild(drone);
        droneSpeed += 0.2;
    }

    function destroyDrone() {
        let targetDrone = drone;
        drone = null;
        targetDrone.style.filter = "brightness(3)";
        setTimeout(() => {
            targetDrone.remove();
            createDrone();
        }, 50);
    }

    function gameOver() {
        isGameOver = true;
        finalScoreElement.innerText = "نقاطك النهائية: " + score;
        endScreen.style.display = 'flex';
        
        let fall = 0;
        let fallInterval = setInterval(() => {
            fall += 5;
            player.style.top = (parseInt(player.style.top) + fall) + 'px';
            player.style.transform = `rotate(-20deg)`;
            if (parseInt(player.style.top) > window.innerHeight) clearInterval(fallInterval);
        }, 30);
    }

    function isColliding(a, b) {
        let aRect = a.getBoundingClientRect();
        let bRect = b.getBoundingClientRect();
        const padding = 15;
        return !(aRect.top + padding > bRect.bottom - padding || aRect.bottom - padding < bRect.top + padding || aRect.right - padding < bRect.left + padding || aRect.left + padding > bRect.right - padding);
    }
</script>
</body>
</html>

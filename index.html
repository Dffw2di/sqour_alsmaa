<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صقور السماء</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        
        /* تأثير الخلفية المضببة مع بياض */
        #game-view {
            width: 100vw; height: 100vh;
            background-image: url('im1.png');
            background-size: cover; background-position: center;
            position: relative; display: none;
        }
        #game-view::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(4px); z-index: 1;
        }

        /* شاشة البداية */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('im1.png');
            background-size: cover; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 5000;
        }
        #start-screen h1 { font-size: 80px; margin: 0; }
        #more-text { display: none; margin: 15px 0; color: #fff; }
        .btn-main { padding: 15px 60px; font-size: 24px; cursor: pointer; border-radius: 50px; border: none; background: #28a745; color: white; margin: 10px; }
        .btn-secondary { background: none; border: 2px solid white; color: white; padding: 8px 20px; cursor: pointer; border-radius: 5px; }

        /* العناصر */
        #player { width: 100px; position: absolute; left: 40px; z-index: 100; transition: transform 0.1s; }
        .bullet { width: 50px; position: absolute; z-index: 90; }
        .drone { width: 120px; position: absolute; z-index: 95; }

        #ui-layer { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; font-weight: bold; z-index: 1000; background: rgba(0,0,0,0.5); padding: 5px 25px; border-radius: 50px; }

        #end-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 6000;
        }

        /* أزرار الجوال */
        #mobile-controls {
            position: fixed; bottom: 30px; width: 100%; display: none;
            justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 2000;
        }
        .nav-btns { display: flex; flex-direction: column; gap: 15px; }
        .joy-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.3);
            border: 2px solid #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 25px; color: #fff;
            user-select: none; touch-action: manipulation;
        }
        #btn-fire { width: 110px; height: 110px; background: rgba(255, 0, 0, 0.5); }

        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>صقور السماء</h1>
        <button class="btn-main" onclick="initGame()">ابدأ اللعب</button>
        <button class="btn-secondary" onclick="document.getElementById('more-text').style.display='block'">اضغط لمشاهدة رسالة الشكر</button>
        <h6 id="more-text">شكرا لجميع الكوادر العاملة في هاته البلاد لما قدموه من تفاني في اعمالهم </h6>
    </div>

    <div id="game-view">
        <div id="ui-layer">النقاط: <span id="score-val">0</span></div>
        <img src="im2.png" id="player" alt="الطائرة">
        
        <div id="mobile-controls">
            <div class="nav-btns">
                <div class="joy-btn" id="m-up">W</div>
                <div class="joy-btn" id="m-down">S</div>
            </div>
            <div class="joy-btn" id="btn-fire">FIRE</div>
        </div>
    </div>

    <div id="end-screen">
        <h1 style="color: #ff4d4d; font-size: 60px;">ارتقيت شهيدا</h1>
        <h2 id="final-score" style="font-size: 30px;">النقاط: 0</h2>
        <button class="btn-main" onclick="location.reload()">إعادة محاولة</button>
    </div>

<script>
    const gameView = document.getElementById('game-view');
    const player = document.getElementById('player');
    const scoreVal = document.getElementById('score-val');
    const endScreen = document.getElementById('end-screen');
    
    let score = 0;
    let isLive = false;
    let playerY = window.innerHeight / 2;
    let drone = null;
    let droneSpeed = 5;
    const playerStep = 12;

    const activeKeys = {};
    window.addEventListener('keydown', (e) => activeKeys[e.code] = true);
    window.addEventListener('keyup', (e) => activeKeys[e.code] = false);

    let touchUp = false, touchDown = false;
    document.getElementById('m-up').ontouchstart = (e) => { e.preventDefault(); touchUp = true; };
    document.getElementById('m-up').ontouchend = () => touchUp = false;
    document.getElementById('m-down').ontouchstart = (e) => { e.preventDefault(); touchDown = true; };
    document.getElementById('m-down').ontouchend = () => touchDown = false;
    document.getElementById('btn-fire').ontouchstart = (e) => { e.preventDefault(); if(isLive) fire(); };

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameView.style.display = 'block';
        isLive = true;
        spawnDrone();
        gameLoop();
    }

    function gameLoop() {
        if (!isLive) return;

        if (activeKeys['KeyW'] || touchUp) playerY -= playerStep;
        if (activeKeys['KeyS'] || touchDown) playerY += playerStep;

        if (playerY < 0) playerY = 0;
        if (playerY > window.innerHeight - 100) playerY = window.innerHeight - 100;
        player.style.top = playerY + 'px';

        if (activeKeys['Space']) { fire(); activeKeys['Space'] = false; }

        if (drone && drone.dataset.falling !== "true") {
            let currentRight = parseFloat(drone.style.right);
            drone.style.right = (currentRight + droneSpeed) + 'px';
            if (checkHit(player, drone)) terminateGame();
            if (currentRight > window.innerWidth) spawnDrone();
        }
        requestAnimationFrame(gameLoop);
    }

    function fire() {
        const b = document.createElement('img');
        b.src = 'im3.png';
        b.className = 'bullet';
        b.style.left = (player.offsetLeft + 90) + 'px';
        b.style.top = (player.offsetTop + 30) + 'px';
        gameView.appendChild(b);

        let moveB = setInterval(() => {
            if (!isLive) { clearInterval(moveB); b.remove(); return; }
            let bLeft = parseFloat(b.style.left);
            b.style.left = (bLeft + 22) + 'px';

            if (drone && drone.dataset.falling !== "true" && checkHit(b, drone)) {
                clearInterval(moveB);
                b.remove();
                score += 10;
                scoreVal.innerText = score;
                animateDroneFall();
            }
            if (bLeft > window.innerWidth) { clearInterval(moveB); b.remove(); }
        }, 20);
    }

    function spawnDrone() {
        if (drone) drone.remove();
        drone = document.createElement('img');
        drone.src = 'im4.png';
        drone.className = 'drone';
        drone.dataset.falling = "false";
        drone.style.right = '-150px';
        drone.style.top = Math.random() * (window.innerHeight - 150) + 'px';
        gameView.appendChild(drone);
        droneSpeed += 0.15;
    }

    // دالة سقوط المسيرة عند الاستهداف
    function animateDroneFall() {
        let target = drone;
        target.dataset.falling = "true";
        drone = null; // تفريغ المتغير فوراً لإنتاج مسيرة جديدة لاحقاً
        
        let fallY = 0;
        let fallX = parseFloat(target.style.right);
        let rotation = 0;

        let fallInterval = setInterval(() => {
            fallY += 8;
            fallX += 2;
            rotation += 15;
            target.style.top = (parseFloat(target.style.top) + fallY) + 'px';
            target.style.right = fallX + 'px';
            target.style.transform = `rotate(${rotation}deg)`;
            target.style.filter = "brightness(0.5) sepia(1)";

            if (parseFloat(target.style.top) > window.innerHeight) {
                clearInterval(fallInterval);
                target.remove();
                spawnDrone();
            }
        }, 30);
    }

    function terminateGame() {
        isLive = false;
        document.getElementById('final-score').innerText = "النقاط النهائية: " + score;
        endScreen.style.display = 'flex';
        
        // سقوط الطائرة عند الاصطدام
        let pFall = 0;
        let pRot = 0;
        let pAnim = setInterval(() => {
            pFall += 10;
            pRot -= 5;
            player.style.top = (player.offsetTop + pFall) + 'px';
            player.style.transform = `rotate(${pRot}deg)`;
            if (player.offsetTop > window.innerHeight) clearInterval(pAnim);
        }, 30);
    }

    function checkHit(obj1, obj2) {
        let r1 = obj1.getBoundingClientRect();
        let r2 = obj2.getBoundingClientRect();
        // تم تكبير الـ padding ليكون 60 لزيادة الدقة والعدالة
        const p = 60; 
        return !(r1.top + p > r2.bottom - p || r1.bottom - p < r2.top + p || r1.right - p < r2.left + p || r1.left + p > r2.right - p);
    }
</script>
</body>
</html>
